name: CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install dependencies
        run: npm install
      
      - name: Simulate deployment to staging
        run: |
          echo "========================================="
          echo "🚀 Starting deployment to staging server..."
          echo "========================================="
          echo "📦 App: DevOps Activity"
          echo "🌐 Environment: Staging"
          echo "✅ Deployment complete!"
          echo "========================================="
      
      - name: Demonstrate secret usage
        run: |
          echo "🔐 DEPLOY_KEY secret is configured"
          echo "Secret length: ${{ secrets.DEPLOY_KEY }}"
